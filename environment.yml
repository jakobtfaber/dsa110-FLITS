name: flits
channels:
  - conda-forge
  - defaults

dependencies:
  # ===== Core Python =====
  - python=3.12
  
  # ===== Core Scientific Computing =====
  - numpy>=1.20.0
  - scipy>=1.7.0
  - astropy>=5.0
  - pandas>=1.3.0
  - h5py>=3.0
  
  # ===== Plotting and Visualization =====
  - matplotlib>=3.4.0,<3.11  # <3.11: scienceplots 2.2.1 uses matplotlib.style.core, removed in mpl 3.11
  - seaborn  # For enhanced statistical visualizations
  
  # ===== Interactive Computing =====
  - ipython
  - jupyter
  - jupyterlab  # Modern Jupyter interface
  - notebook
  - ipywidgets>=7.6.0  # Required for interactive widgets
  - ipykernel  # Jupyter kernel
  
  # ===== Performance and Parallel Computing =====
  - numba>=0.54.0  # JIT compilation
  - joblib>=1.1.0  # Parallel processing
  
  # ===== Data Analysis and Manipulation =====
  - scikit-image>=0.18.0  # Image processing and Gaussian filtering
  
  # ===== Configuration and I/O =====
  - pyyaml>=5.4.0
  - tqdm>=4.62.0  # Progress bars
  
  # ===== Statistical Analysis and Error Propagation =====
  - uncertainties>=3.1.4
  
  # ===== Astronomy-Specific Packages =====
  - astroquery  # Query astronomical databases (NED, SDSS, etc.)
  - pyvo  # IVOA TAP/VO client (NOIRLab Astro Data Lab: DESI Legacy DR10, DESI DR1 spectroscopy)
  - healpy  # HEALPix for all-sky maps
  - regions  # Astronomical region handling
  
  # ===== Testing and Quality Assurance =====
  - pytest>=7.0
  - pytest-cov  # Code coverage
  - hypothesis  # Property-based testing
  
  # ===== Development Tools =====
  - black  # Code formatting
  - ruff  # Fast linter
  - mypy  # Static type checking
  - pre-commit  # Git hooks for quality checks
  
  # ===== Documentation =====
  - sphinx  # Documentation generation
  - sphinx_rtd_theme  # Read the Docs theme
  
  # ===== Package Management =====
  - pip
  - setuptools>=65,<81  # <81: pygedm imports pkg_resources, removed in setuptools 81
  - wheel
  
  # ===== Pip-only Packages =====
  - pip:
    # MCMC and Bayesian Inference
    - emcee>=3.1.0  # Affine-invariant MCMC sampler
    - dynesty>=2.1.0  # Nested sampling for Bayesian evidence
    - corner>=2.2.0  # Corner plots for MCMC diagnostics
    - chainconsumer>=0.34.0  # MCMC chain analysis and visualization

    # Plotting Styles
    - SciencePlots>=2.0  # Matplotlib publication styles (used in galaxies/ figures); needs matplotlib<3.11
    - adjustText>=0.8  # Deconflict overlapping labels in galaxies/ sightline figures

    # Fitting and Optimization
    - lmfit>=1.0.0  # Non-linear least-squares minimization
    
    # Galactic Models
    - mwprop>=0.1.0  # Milky Way electron density models (NE2001)
    # pygedm: NE2001/YMW16 Galactic DM+scattering for the FRB DM budget
    # (galaxies/foreground/sightline_budget.py). Optional; the module degrades to
    # DM_MW=NaN if absent. macOS arm64 has no wheel and the pip build needs
    # netlib libf2c: build libf2c.a from netlib.org/f2c/libf2c.zip (make -f
    # makefile.u), copy its f2c.h into the pygedm sdist ne21c/ dir, then
    # `LIBRARY_PATH=<libf2c_dir> pip install .`. Runtime also needs the
    # setuptools<81 pin above; the scipy>=1.14 integrate.simps removal is
    # shimmed in sightline_budget._load_pygedm.
    - pygedm>=3.3.0  # offline NE2001/YMW16/YT2020 (see build note above)
