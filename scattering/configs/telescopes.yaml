# telescopes.yaml
#
# Store *raw* instrumental parameters for each facility in **one place**.
# Add as many telescope blocks as you like, one per key.  All values are
# plain numbers (SI units noted in comments); use YAML “null” (or leave
# blank) as a placeholder until you know the number.

# Example entry — DELETE or edit:
# VLA:
#   df_MHz_raw: 2.0          # native channel width [MHz]
#   dt_ms_raw: 1.0           # native time sample  [ms]
#   f_min_GHz: 1.0           # bottom of processed band [GHz]
#   f_max_GHz: 2.0           # top of processed band    [GHz]

# Telescope parameters
dsa:
  df_MHz_raw: 0.03051757812 # float, MHz
  dt_ms_raw: 32.768e-3 # float, ms
  f_min_GHz: 1.31125 # float, GHz
  f_max_GHz: 1.49875 # float, GHz
  flux_jy_per_unit: null # absolute flux scale: Jy per native .npy fluence unit, from SEFD + beam at the burst position (Law+2024 method). null => uncalibrated; no energy emitted. See analysis/burst_energies/CALIBRATION_REVIEW.md
  beam_model_h5: null # path to the measured Jones beam cube (DSA110_beam_1.h5, ~345 MB, external/gitignored) used by analysis/dsa_beam.py for G(theta,phi,nu). SEFD is measured per-epoch by dsa110-rt (lxd110h23:5777), not stored here.
  freq_descending: true # DSA .npy stored row 0 = f_max: dsa110-scat dedisperses with fch1=1498.75 (ch0=high) and its fitter flips the model (burstfittools.py:160) to match descending data; loader flips to ascending

chime:
  df_MHz_raw: 0.390625 # float, MHz
  dt_ms_raw: 2.56e-3 # float, ms (voltage sample rate)
  f_min_GHz: 0.40019 # float, GHz
  f_max_GHz: 0.80019 # float, GHz
  flux_jy_per_unit: null # absolute flux scale: Jy per native .npy fluence unit, from SEFD + primary-beam at the burst position (Andersen+2023 / baseband Catalog 2024 method). null => uncalibrated; no energy emitted. See analysis/burst_energies/CALIBRATION_REVIEW.md
  freq_descending: true # CHIME baseband_analysis stores row 0 = f_max (800 MHz); loader flips to ascending

