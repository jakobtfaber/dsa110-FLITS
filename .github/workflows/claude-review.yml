name: Claude Review

# Automatic Claude review on pull requests, authenticated with a Claude
# subscription (Max/Pro) OAuth token — NOT an Anthropic API key.
#
# One-time setup:
#   1. claude setup-token | gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo jakobtfaber/dsa110-FLITS
#   2. Install the Claude GitHub App (https://github.com/apps/claude) on this repo.
#      Inline review comments use the app installation (OIDC); GITHUB_TOKEN alone
#      cannot post them.
#
# Required for reviews to actually post (not just run silently):
#   - Prompt must use the code-review plugin with --comment (see dotfiles workflow).
#   - claude_args must allowlist posting tools.
#   - Do NOT set track_progress — it forces tag mode (sticky comment only, no inline review).
#   - Do NOT pass github_token — it bypasses the Claude GitHub App OIDC path.

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Token presence gate
        id: gate
        env:
          TOK: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Claude review skipped::Set CLAUDE_CODE_OAUTH_TOKEN (claude setup-token) to enable automatic Claude reviews."
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.ok == 'true'
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.ok == 'true'
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: |
            --system-prompt "FLITS reviewer. Apply AGENTS.md review guidelines: physics kernel ownership (burstfit.py, not flits/ wrapper); fit-validation contract (.cursor/rules/AGENT_CONFIGURATION_FLITS.md — never rationalize failing fits); physics bounds (0.0001 < tau < 100 ms; 1.5 < alpha < 6.0; tau*dnu in [0.1, 2.0]); ponytail (shortest correct diff, never drop validation). Skip ruff style nits and docs/*.html base64 payloads."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"

      - name: Verify review posted
        if: steps.gate.outputs.ok == 'true' && steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          since="${{ github.run_started_at }}"

          inline="$(gh api "repos/$repo/pulls/$pr/comments" --paginate \
            | jq --arg since "$since" \
              '[.[] | select(.user.login == "claude[bot]") | select(.created_at >= $since)] | length')"

          if [ "$inline" -gt 0 ]; then
            echo "Posted $inline claude[bot] inline review comment(s) this run."
            exit 0
          fi

          summary="$(gh pr view "$pr" --repo "$repo" --json comments \
            | jq --arg since "$since" \
              '[.comments[] | select(.author.login == "claude[bot]") | select(.createdAt >= $since)] | length')"

          if [ "$summary" -gt 0 ]; then
            echo "Posted claude[bot] review summary comment this run."
            exit 0
          fi

          # No comment posted. That is NOT itself a failure - a clean PR with
          # nothing to flag legitimately yields zero inline comments. The real
          # health signal is whether the action executed and the FINAL result
          # event has is_error == false. The action writes execution_file only
          # when it runs; an empty/missing file means it never ran (workflow-diff
          # skip - claude-code-action refuses to run on a PR whose workflow
          # differs from the default branch - or a pre-exec auth outage).
          exec_file="${{ steps.claude.outputs.execution_file }}"
          [ -n "$exec_file" ] || exec_file="$RUNNER_TEMP/claude-execution-output.json"
          if [ ! -f "$exec_file" ]; then
            echo "::warning title=Claude review unavailable::Claude Code Action did not execute (workflow-diff skip on a PR that edits this workflow, or a token/auth outage). Reviews resume once this is on the default branch with a valid CLAUDE_CODE_OAUTH_TOKEN (claude setup-token). Not blocking this PR."
            exit 0
          fi

          # is_error of the FINAL result event only (intermediate tool_result
          # events can carry is_error:true mid-review and must be ignored).
          final_err="$(jq -rs '[.. | objects | select(.type == "result")] | last | .is_error' "$exec_file" 2>/dev/null || echo "")"
          if [ "$final_err" = "true" ]; then
            echo "::warning title=Claude review unavailable::Claude could not complete (likely expired CLAUDE_CODE_OAUTH_TOKEN; refresh with 'claude setup-token | gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo $repo'). Not blocking this PR."
            exit 0
          fi

          echo "Claude review completed (final is_error=$final_err); no inline comments this run - nothing flagged."
          exit 0
