name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Same-repo PRs only (fork PRs cannot read secrets); skip bot-authored PRs.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      # Self-skip (green, not red) until CLAUDE_CODE_OAUTH_TOKEN is set, so this
      # workflow never blocks PRs before the secret is provisioned.
      - name: Token presence gate
        id: gate
        env:
          TOK: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Claude review skipped::Set the CLAUDE_CODE_OAUTH_TOKEN secret (run 'claude setup-token') to enable automatic Claude reviews."
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.ok == 'true'
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.ok == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the built-in Actions token to post; skips OIDC (no id-token: write,
          # no Claude GitHub App install needed). pull-requests: write covers posting.
          github_token: ${{ github.token }}
          prompt: |
            Review this pull request as a careful reviewer for FLITS, an FRB
            scattering/scintillation analysis pipeline. Post concise inline
            comments only on real issues; if there are none, say so briefly.
            Focus on:
            - Correctness and bugs in changed code, especially the physics kernel
              scattering/scat_analysis/burstfit.py and any flits/ wrapper of it
              (model-physics changes belong in burstfit.py, not the wrapper).
            - The fit-validation contract in
              .cursor/rules/AGENT_CONFIGURATION_FLITS.md: flag anything that could
              rationalize a failing/marginal fit into a pass, drop a validation
              level, or skip the diagnostic-figure review gate.
            - Physics sanity: units, frequency-ascending assumptions, and bounds
              (0.0001 < tau < 100 ms; 1.5 < alpha < 6.0; tau*dnu in [0.1, 2.0]).
            - Over-engineering (ponytail): unnecessary abstractions, dead code,
              speculative config, near-duplicate modules. Prefer the shortest
              correct diff, but never relax scientific rigor for brevity.
            Do not nitpick style that ruff already enforces. Ignore base64 image
            payloads embedded in docs/*.html.
          claude_args: "--max-turns 8"
