name: Claude Review

# Automatic Claude review on pull requests, authenticated with a Claude
# subscription (Max/Pro) OAuth token — NOT an Anthropic API key.
#
# One-time setup:
#   1. claude setup-token | gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo jakobtfaber/dsa110-FLITS
#   2. Install the Claude GitHub App (https://github.com/apps/claude) on this repo.
#      Inline review comments use the app installation (OIDC); GITHUB_TOKEN alone
#      cannot post them.
#
# Required for reviews to actually post (not just run silently):
#   - Prompt must use the code-review plugin with --comment (see dotfiles workflow).
#   - claude_args must allowlist posting tools.
#   - Do NOT set track_progress — it forces tag mode (sticky comment only, no inline review).
#   - Do NOT pass github_token — it bypasses the Claude GitHub App OIDC path.

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Token presence gate
        id: gate
        env:
          TOK: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Claude review skipped::Set CLAUDE_CODE_OAUTH_TOKEN (claude setup-token) to enable automatic Claude reviews."
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.ok == 'true'
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.ok == 'true'
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: |
            --system-prompt "FLITS reviewer. Apply AGENTS.md review guidelines: physics kernel ownership (burstfit.py, not flits/ wrapper); fit-validation contract (.cursor/rules/AGENT_CONFIGURATION_FLITS.md — never rationalize failing fits); physics bounds (0.0001 < tau < 100 ms; 1.5 < alpha < 6.0; tau*dnu in [0.1, 2.0]); ponytail (shortest correct diff, never drop validation). Skip ruff style nits and docs/*.html base64 payloads."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"

      - name: Verify review posted
        if: steps.gate.outputs.ok == 'true' && steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          since="${{ github.run_started_at }}"

          inline="$(gh api "repos/$repo/pulls/$pr/comments" --paginate \
            | jq --arg since "$since" \
              '[.[] | select(.user.login == "claude[bot]") | select(.created_at >= $since)] | length')"

          if [ "$inline" -gt 0 ]; then
            echo "Posted $inline claude[bot] inline review comment(s) this run."
            exit 0
          fi

          summary="$(gh pr view "$pr" --repo "$repo" --json comments \
            | jq --arg since "$since" \
              '[.comments[] | select(.author.login == "claude[bot]") | select(.createdAt >= $since)] | length')"

          if [ "$summary" -gt 0 ]; then
            echo "Posted claude[bot] review summary comment this run."
            exit 0
          fi

          # No comment posted. Distinguish a Claude-side outage (expired
          # CLAUDE_CODE_OAUTH_TOKEN / exec error -> is_error in the execution
          # log) from a genuine posting regression (Claude ran clean but posted
          # nothing). Only the latter should fail the check; a lapsed personal
          # Max token must not block PRs.
          exec_file="${{ steps.claude.outputs.execution_file }}"
          [ -n "$exec_file" ] || exec_file="$RUNNER_TEMP/claude-execution-output.json"
          if [ -f "$exec_file" ] && grep -q '"is_error"[[:space:]]*:[[:space:]]*true' "$exec_file"; then
            echo "::warning title=Claude review unavailable::Claude could not run (likely expired CLAUDE_CODE_OAUTH_TOKEN). Refresh with 'claude setup-token | gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo $repo'. Not blocking this PR."
            exit 0
          fi

          echo "::error title=Claude review no-op::Claude ran but posted no claude[bot] comments this run (posting regression). Check the code-review plugin / allowedTools and the Claude GitHub App on $repo."
          exit 1
