burst_id: casey
input_data_path: ${FLITS_ROOT}/scintillation/data/casey_chime_hi.npz
telescope: chime
analysis:
  rfi_masking:
    find_burst_thres: 8.0
    padding_factor: 0.0
    use_symmetric_noise_window: true
    rfi_downsample_factor: 16
    enable_time_domain_flagging: false
    time_threshold_sigma: 7.0
    freq_threshold_sigma: 5.0
    # time bins (dt=0.0819 ms): burst peak ~893 (S/N~14), FWHM 0.18 ms ~ 2 bins.
    manual_burst_window:
    - 889
    - 898
    manual_noise_window:
    - 0
    - 860
  acf:
    # High-band focus: full band 400-800 fails (only the top ~80 MHz resolves a clean Lorentzian; the
    # 462-715 MHz subbands are lag-0/noise-dominated). Restrict to 711-799 MHz where the per-subband
    # diagnostic gave R2=0.94, gamma~117 kHz. Across 711-799 Dnu_d ~ nu^4.4 varies only ~1.7x -> 2 subbands.
    num_subbands: 2
    max_lag_mhz: 5.0
    use_snr_subbanding: true
    enable_intra_pulse_analysis: false
    intra_pulse_time_bins: 8
  fitting:
    # measured CHIME Dnu_d ~0.1-0.3 MHz in this band -> fit the narrow central peak only.
    fit_lagrange_mhz: 1.0
    reference_frequency_mhz: 755.0
    force_model: null
  baseline_subtraction:
    enable: true
    poly_order: 1
  noise:
    disable: false
    disable_template: false
    template_n_draws: 25
  self_noise:
    disable: false
  stored_fits: {}
